name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install system deps (rsvg-convert)
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Install Pillow
        run: pip install pillow

      - name: Compile check
        run: python3 -m py_compile skills/repo-glowup/scripts/*.py

      - name: Unit tests
        run: python3 -m unittest discover -s skills/repo-glowup/scripts/tests -v

      - name: Self-check (all palettes, end-to-end)
        run: bash skills/repo-glowup/scripts/selfcheck.sh
